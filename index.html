  <!-- Legacy data cleanup: purge old localStorage keys from previous app versions.
       Runs before React boots so no stale data is ever accessible. -->
  <script>
    (function () {
      try {
        // Remove guest-mode data cache (account required — no more guest mode)
        localStorage.removeItem('aura_data');
        // Migrate view state from localStorage → sessionStorage (one-time migration)
        var v = localStorage.getItem('journal_current_view');
        if (v) {
          sessionStorage.setItem('journal_current_view', v);
          localStorage.removeItem('journal_current_view');
        }
      } catch (e) { /* ignore — private browsing may block storage access */ }
    })();
  </script>
